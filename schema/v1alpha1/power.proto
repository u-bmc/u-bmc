syntax = "proto3";

package u_bmc.schema.v1alpha1;

import "buf/validate/validate.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/u-bmc/u-bmc/api/gen/schema/v1alpha1";

message PowerOnRequest {
  string component_name = 1 [ (buf.validate.field).string.min_len = 1 ];
  optional google.protobuf.Duration timeout = 2;
}

message PowerOnResponse {
  string component_name = 1 [ (buf.validate.field).string.min_len = 1 ];
  bool success = 2;
  optional string error_message = 3;
  google.protobuf.Timestamp timestamp = 4
      [ (buf.validate.field).required = true ];
}

message PowerOffRequest {
  string component_name = 1 [ (buf.validate.field).string.min_len = 1 ];
  bool force = 2;
  optional google.protobuf.Duration timeout = 3;
}

message PowerOffResponse {
  string component_name = 1 [ (buf.validate.field).string.min_len = 1 ];
  bool success = 2;
  bool force = 3;
  optional string error_message = 4;
  google.protobuf.Timestamp timestamp = 5
      [ (buf.validate.field).required = true ];
}

message PowerResetRequest {
  string component_name = 1 [ (buf.validate.field).string.min_len = 1 ];
  optional PowerResetType reset_type = 2
      [ (buf.validate.field).enum.defined_only = true ];
  optional google.protobuf.Duration timeout = 3;
}

message PowerResetResponse {
  string component_name = 1 [ (buf.validate.field).string.min_len = 1 ];
  bool success = 2;
  optional PowerResetType reset_type = 3
      [ (buf.validate.field).enum.defined_only = true ];
  optional string error_message = 4;
  google.protobuf.Timestamp timestamp = 5
      [ (buf.validate.field).required = true ];
}

message PowerStatusRequest {
  string component_name = 1 [ (buf.validate.field).string.min_len = 1 ];
}

message PowerStatusResponse {
  string component_name = 1 [ (buf.validate.field).string.min_len = 1 ];
  bool powered = 2;
  optional PowerState power_state = 3
      [ (buf.validate.field).enum.defined_only = true ];
  optional string error_message = 4;
  google.protobuf.Timestamp timestamp = 5
      [ (buf.validate.field).required = true ];
}

message PowerConsumptionRequest {
  string component_name = 1 [ (buf.validate.field).string.min_len = 1 ];
}

message PowerConsumptionResponse {
  string component_name = 1 [ (buf.validate.field).string.min_len = 1 ];
  double consumption_watts = 2 [ (buf.validate.field).double.gte = 0 ];
  optional double average_consumption_watts = 3
      [ (buf.validate.field).double.gte = 0 ];
  optional double peak_consumption_watts = 4
      [ (buf.validate.field).double.gte = 0 ];
  optional google.protobuf.Duration measurement_interval = 5;
  optional string error_message = 6;
  google.protobuf.Timestamp timestamp = 7
      [ (buf.validate.field).required = true ];
}

message PowerCapRequest {
  string component_name = 1 [ (buf.validate.field).string.min_len = 1 ];
  bool get_cap = 2;
  optional double cap_watts = 3 [ (buf.validate.field).double.gt = 0 ];
  optional google.protobuf.Duration duration = 4;
  optional PowerCapEnforcementPolicy enforcement_policy = 5
      [ (buf.validate.field).enum.defined_only = true ];
}

message PowerCapResponse {
  string component_name = 1 [ (buf.validate.field).string.min_len = 1 ];
  double cap_watts = 2 [ (buf.validate.field).double.gte = 0 ];
  bool success = 3;
  bool active = 4;
  optional google.protobuf.Duration remaining_duration = 5;
  optional PowerCapEnforcementPolicy enforcement_policy = 6
      [ (buf.validate.field).enum.defined_only = true ];
  optional string error_message = 7;
  google.protobuf.Timestamp timestamp = 8
      [ (buf.validate.field).required = true ];
  optional google.protobuf.Duration duration = 9;
}

message PowerEventRequest {
  optional string component_name = 1;
  repeated PowerEventType event_types = 2;
}

message PowerEvent {
  string component_name = 1 [ (buf.validate.field).string.min_len = 1 ];
  PowerEventType event_type = 2
      [ (buf.validate.field).enum.defined_only = true ];
  optional string event_data = 3;
  google.protobuf.Timestamp timestamp = 4
      [ (buf.validate.field).required = true ];
  optional PowerEventSeverity severity = 5
      [ (buf.validate.field).enum.defined_only = true ];
}

enum PowerResetType {
  POWER_RESET_TYPE_UNSPECIFIED = 0;
  POWER_RESET_TYPE_SOFT = 1;
  POWER_RESET_TYPE_HARD = 2;
  POWER_RESET_TYPE_WARM = 3;
  POWER_RESET_TYPE_COLD = 4;
}

enum PowerState {
  POWER_STATE_UNSPECIFIED = 0;
  POWER_STATE_OFF = 1;
  POWER_STATE_ON = 2;
  POWER_STATE_STANDBY = 3;
  POWER_STATE_SUSPEND = 4;
  POWER_STATE_HIBERNATE = 5;
  POWER_STATE_TRANSITIONING_ON = 6;
  POWER_STATE_TRANSITIONING_OFF = 7;
  POWER_STATE_ERROR = 8;
  POWER_STATE_UNKNOWN = 9;
}

enum PowerCapEnforcementPolicy {
  POWER_CAP_ENFORCEMENT_POLICY_UNSPECIFIED = 0;
  POWER_CAP_ENFORCEMENT_POLICY_THROTTLE = 1;
  POWER_CAP_ENFORCEMENT_POLICY_SHUTDOWN = 2;
  POWER_CAP_ENFORCEMENT_POLICY_ALERT_ONLY = 3;
  POWER_CAP_ENFORCEMENT_POLICY_BEST_EFFORT = 4;
}

enum PowerEventType {
  POWER_EVENT_TYPE_UNSPECIFIED = 0;
  POWER_EVENT_TYPE_POWER_ON = 1;
  POWER_EVENT_TYPE_POWER_OFF = 2;
  POWER_EVENT_TYPE_RESET = 3;
  POWER_EVENT_TYPE_POWER_FAULT = 4;
  POWER_EVENT_TYPE_OVER_CURRENT = 5;
  POWER_EVENT_TYPE_UNDER_VOLTAGE = 6;
  POWER_EVENT_TYPE_OVER_VOLTAGE = 7;
  POWER_EVENT_TYPE_THERMAL_SHUTDOWN = 8;
  POWER_EVENT_TYPE_CAP_EXCEEDED = 9;
  POWER_EVENT_TYPE_CAP_SET = 10;
  POWER_EVENT_TYPE_CAP_CLEARED = 11;
  POWER_EVENT_TYPE_SUPPLY_FAILED = 12;
  POWER_EVENT_TYPE_SUPPLY_RESTORED = 13;
}

enum PowerEventSeverity {
  POWER_EVENT_SEVERITY_UNSPECIFIED = 0;
  POWER_EVENT_SEVERITY_INFO = 1;
  POWER_EVENT_SEVERITY_WARNING = 2;
  POWER_EVENT_SEVERITY_CRITICAL = 3;
  POWER_EVENT_SEVERITY_FATAL = 4;
}
